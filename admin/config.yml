backend:
  name: github
  repo: paulagcampani-png/coachlugano
  branch: main
  base_url: https://coachlugano.vercel.app
  auth_endpoint: api/auth

# IMPORTANT — what this file does and does NOT do:
# - It ONLY edits text between the <!-- decap:xxx --> ... <!-- /decap:xxx -->
#   marker comments placed inside index.html and index-it.html.
# - It cannot see or touch the <form> tag's action/method attributes, field
#   name= attributes, the hidden _subject value, or anything related to
#   Formspree. Those were deliberately never wrapped in any marker.
# - It cannot touch CSS, JS, images, or any tracking/analytics code.
# - English and Italian are two separate entries below — editing one does
#   NOT automatically translate or update the other. Decap has no
#   translation logic; each language must be edited on its own.

media_folder: "images"
public_folder: "/images"

collections:
  - name: "english"
    label: "English Page (index.html)"
    files:
      - file: "index.html"
        label: "Homepage Text — English"
        name: "homepage_en"
        fields:
          - { label: "Hero Headline", name: "hero_title", widget: "markdown", buttons: [] }
          - { label: "Hero Description", name: "hero_desc", widget: "text" }
          - { label: "About — Paragraph 1", name: "about_p1", widget: "text" }
          - { label: "About — Paragraph 2", name: "about_p2", widget: "text" }
          - { label: "FAQ 1 — Question", name: "faq_1_q", widget: "string" }
          - { label: "FAQ 1 — Answer", name: "faq_1_a", widget: "text" }
